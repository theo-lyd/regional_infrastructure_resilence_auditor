version: 2

models:
  - name: mart_service_maturity_index
    description: "Cross-sector maturity indicator by region and year."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: mart_underserved_region_score
    description: "Penalty-style score indicating potential underserved conditions by region-year."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: mart_coverage_gap_index
    description: "Gap index versus sector benchmark coverage by region-year."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: mart_growth_and_concentration
    description: "Year-over-year growth and concentration trend rollup by region-year."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: mart_capacity_benchmark
    description: "Benchmark-relative capacity index by region and year."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: mart_resilience_score
    description: "Composite resilience score combining maturity, underserved, gap, and growth components."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: resilience_score
        tests:
          - not_null

  - name: mart_data_quality_status
    description: "Annual data quality status derived from completeness signals on conformed facts."
    columns:
      - name: year
        tests:
          - not_null
          - unique
      - name: total_rows
        tests:
          - not_null
      - name: data_quality_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['good', 'watch', 'critical', 'insufficient']

  - name: mart_data_quality_scorecard_domain
    description: "Annual domain-level quality scorecard for childcare, youth, and hospital sectors."
    columns:
      - name: year
        tests:
          - not_null
      - name: sector_id
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['childcare', 'youth', 'hospital']
      - name: domain_quality_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['good', 'watch', 'critical', 'insufficient']

  - name: mart_kpi_summary_executive
    description: "Annual executive KPI summary view used by the stakeholder overview dashboard."
    columns:
      - name: year
        tests:
          - not_null
          - unique
      - name: data_quality_status
        tests:
          - not_null

  - name: mart_kpi_summary_domain
    description: "Annual KPI summary by domain for childcare, youth welfare, and hospital capacity."
    columns:
      - name: year
        tests:
          - not_null
      - name: sector_id
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['childcare', 'youth', 'hospital']
