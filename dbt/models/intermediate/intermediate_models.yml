version: 2

models:
  - name: int_childcare_regional
    description: "Regional childcare aggregates by year for capacity and demand context."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: int_youth_regional
    description: "Regional youth service aggregates by year with per-population normalization."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: int_hospital_regional
    description: "Regional hospital aggregates by year, including beds-per-hospital and concentration."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null

  - name: int_regional_sector_metrics
    description: "Unified sectoral metric table in long format for all regions and years."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: sector_id
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['childcare', 'youth', 'hospital']
      - name: year
        tests:
          - not_null

  - name: int_regional_sector_yoy
    description: "Year-over-year trend metrics for each region and sector."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: sector_id
        tests:
          - not_null
      - name: year
        tests:
          - not_null
