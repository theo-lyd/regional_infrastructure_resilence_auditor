name: Phase10 CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality-and-dbt:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: dbt
      DBT_DUCKDB_PATH: data/processed/ci_regional_resilience.duckdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check src airflow/dags

      - name: Python Syntax Checks
        run: |
          python -m py_compile src/ingest_raw_duckdb.py
          python -m py_compile src/validate_raw_duckdb.py
          python -m py_compile src/forecasting/phase8_capacity_growth_forecast.py
          python -m py_compile src/forecasting/generate_phase9_screenshots.py
          python -m py_compile src/monitoring/pipeline_sla_monitor.py
          python -m py_compile src/monitoring/dashboard_refresh_signal.py
          python -m py_compile airflow/dags/regional_resilience_pipeline_dag.py

      - name: Prepare DuckDB Raw Layer
        run: |
          python src/ingest_raw_duckdb.py

      - name: dbt Compile
        run: |
          dbt compile --project-dir dbt --profiles-dir dbt

      - name: dbt Test
        run: |
          dbt test --project-dir dbt --profiles-dir dbt

      - name: Build Dashboard Dependency Models
        run: |
          dbt run --project-dir dbt --profiles-dir dbt --select int_regional_sector_metrics int_regional_sector_yoy mart_coverage_gap_index mart_kpi_summary_executive mart_data_quality_status

      - name: Run Predictive Smoke
        run: |
          python src/forecasting/phase8_capacity_growth_forecast.py

      - name: Validate Dashboard Dependency Tables
        run: |
          python - <<'PY'
          import duckdb

          con = duckdb.connect("data/processed/ci_regional_resilience.duckdb", read_only=True)
          required_tables = [
              "analytics_marts.mart_kpi_summary_executive",
              "analytics_marts.mart_data_quality_status",
              "analytics_predictions.pred_capacity_growth_forecast",
              "analytics_predictions.pred_capacity_growth_evaluation",
          ]

          for table in required_tables:
              row_count = con.execute(f"select count(*) from {table}").fetchone()[0]
              if row_count <= 0:
                  raise RuntimeError(f"Smoke check failed: {table} has no rows")
              print(f"OK: {table} rows={row_count}")
          PY
